<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script>
if (localStorage.getItem("isAdmin") !== "true") {
    window.location.href = "login.html";
}
</script>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
}

/* HEADER */
header{
    background:#e23744;
    color:white;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h2{
    margin:0;
    font-size:22px;
}

/* HEADER BUTTONS */
.header-buttons button{
    margin-left:10px;
    padding:7px 14px;
    border-radius:6px;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.orders-btn{
    background:orange;
    color:white;
}

.logout-btn{
    background:white;
}

/* CONTAINER */
.container{
    padding:20px;
}

/* CARDS */
.card-box{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:220px;
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
    margin-bottom:20px;
    font-size:22px;
}

.card p{
    font-size:24px;
}

/* CHART */
.chart-box{
    width:500px;
    margin:35px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* CHAT HISTORY */
.chat-history{
    width:95%;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.chat-history h2{
    margin-top:0;
}

.chat-history table{
    width:100%;
    border-collapse:collapse;
}

.chat-history th,
.chat-history td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

.chat-history th{
    background:#f2f2f2;
}

.success{
    color:green;
    font-weight:bold;
}

.fallback{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>

    <h2>📊 Admin Dashboard</h2>

    <div class="header-buttons">

        <button class="orders-btn" onclick="goOrders()">
            📦 Orders
        </button>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </div>

</header>

<div class="container">

    <!-- CARDS -->
    <div class="card-box">

        <div class="card">
            <h3>Total</h3>
            <p id="total">0</p>
        </div>

        <div class="card">
            <h3>Success</h3>
            <p id="success">0</p>
        </div>

        <div class="card">
            <h3>Fallback</h3>
            <p id="fallback">0</p>
        </div>

    </div>

    <!-- CHART -->
    <div class="chart-box">

        <h3 style="text-align:center;">
            📊 Analytics
        </h3>

        <canvas id="barChart"></canvas>

    </div>


    <!-- CHAT HISTORY -->
    <div class="chat-history">

        <h2>💬 Chat History</h2>

        <table>

            <thead>
                <tr>
                    <th>User Message</th>
                    <th>Bot Response</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="chatHistory"></tbody>

        </table>

    </div>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="dashboard.js"></script>

<script>

function goOrders(){

    window.location.href = "orders.html";

}

function logout(){

    localStorage.removeItem("isAdmin");

    window.location.href = "login.html";

}

</script>

</body>
</html>
