language: en

pipeline:
  - name: WhitespaceTokenizer

  - name: RegexFeaturizer

  - name: LexicalSyntacticFeaturizer

  - name: CountVectorsFeaturizer

  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4

  - name: DIETClassifier
    epochs: 100
    constrain_similarities: true

  - name: EntitySynonymMapper

  - name: FallbackClassifier
    threshold: 0.7

policies:
  - name: RulePolicy

  - name: TEDPolicy
    max_history: 5
    epochs: 100

  - name: UnexpecTEDIntentPolicy
    max_history: 5
    epochs: 100

assistant_id: food-assistant